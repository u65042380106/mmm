{% extends 'base.html' %}
{% block content %}
<div class="container mt-4" style="color: #2d1a4d;">
    
    <div class="d-flex justify-content-between align-items-center mb-4 p-4 rounded-4 shadow-sm" style="background-color: #f5f3ff;">
        <div>
            <h2 class="fw-bold mb-1" style="color: #4c1d95;">
                <i class="fas fa-trophy me-2" style="color: #7c3aed;"></i> Top 9 สินค้าที่คุ้มค่าที่สุด
            </h2>
            <p class="text-muted mb-0 fs-5">AI ได้คัดกรองสินค้าที่ดีที่สุดมาให้แล้ว <b>กรุณาเลือก 3 ชิ้น</b> เพื่อทำการวิเคราะห์เจาะลึกและเปรียบเทียบ</p>
        </div>
        <button type="submit" form="compareForm" id="compareBtn" class="btn btn-lg rounded-pill fw-bold text-white shadow-sm" disabled style="background-color: #d1d5db; border: none; transition: all 0.3s ease;">
            <i class="fas fa-balance-scale me-2"></i> เปรียบเทียบ 3 ชิ้นที่เลือก
        </button>
    </div>

    <form id="compareForm" action="/compare/" method="POST">
        {% csrf_token %}
        <input type="hidden" name="history_id" value="{{ history_id }}">
        
        <div class="row row-cols-1 row-cols-md-3 g-4">
            {% for product in products|slice:":9" %}
            <div class="col">
                <label class="card h-100 shadow-sm border-0 rounded-4 position-relative product-card-label" style="cursor: pointer; transition: transform 0.2s; border: 2px solid transparent!important;">
                    
                    <input type="checkbox" name="selected_products" value="{{ forloop.counter0 }}" class="product-checkbox d-none">
                    
                    <span class="position-absolute top-0 start-0 badge m-3 fs-6 rounded-circle shadow-sm d-flex align-items-center justify-content-center text-white" 
                          style="width: 35px; height: 35px; background-color: #7c3aed; z-index: 10;">
                        {{ forloop.counter }}
                    </span>
                    
                    <img src="{{ product.image_url|default:'https://via.placeholder.com/200' }}" 
                         class="card-img-top rounded-top-4" style="height: 200px; object-fit: contain; padding: 15px;">
                    
                    <div class="card-body p-4 pt-2 text-center">
                        <h6 class="card-title fw-bold text-dark mb-3" style="line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; height: 42px;">
                            {{ product.title }}
                        </h6>
                        <h4 class="fw-bold mb-0" style="color: #6d28d9;">{{ product.price }} ฿</h4>
                    </div>
                    
                    <div class="selection-overlay position-absolute top-0 start-0 w-100 h-100 rounded-4 d-flex justify-content-center align-items-center" style="background-color: rgba(109, 40, 217, 0.15); opacity: 0; pointer-events: none; transition: opacity 0.2s;">
                        <i class="fas fa-check-circle fa-4x text-white shadow-sm rounded-circle" style="background-color: #6d28d9;"></i>
                    </div>
                </label>
            </div>
            {% endfor %}
        </div>
    </form>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        const checkboxes = document.querySelectorAll('.product-checkbox');
        const compareBtn = document.getElementById('compareBtn');
        let selectedCount = 0;

        checkboxes.forEach(box => {
            box.addEventListener('change', function() {
                const card = this.closest('.product-card-label');
                const overlay = card.querySelector('.selection-overlay');
                
                if (this.checked) {
                    if (selectedCount >= 3) {
                        this.checked = false; // ป้องกันการเลือกเกิน 3
                        alert("คุณสามารถเลือกเปรียบเทียบได้สูงสุด 3 ชิ้นเท่านั้นครับ");
                        return;
                    }
                    selectedCount++;
                    card.style.borderColor = "#6d28d9";
                    card.style.transform = "translateY(-5px)";
                    overlay.style.opacity = "1";
                } else {
                    selectedCount--;
                    card.style.borderColor = "transparent";
                    card.style.transform = "none";
                    overlay.style.opacity = "0";
                }

                // ปลดล็อคปุ่มเมื่อเลือกครบ 3 ชิ้น
                if (selectedCount === 3) {
                    compareBtn.disabled = false;
                    compareBtn.style.backgroundColor = "#6d28d9";
                    compareBtn.classList.add("shadow-lg");
                } else {
                    compareBtn.disabled = true;
                    compareBtn.style.backgroundColor = "#d1d5db";
                    compareBtn.classList.remove("shadow-lg");
                }
            });
        });
    });
</script>
{% endblock %}
